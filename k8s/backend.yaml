apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: enterprise-ai
spec:
  replicas: 3
  selector:
    matchLabels: { app: backend }
  template:
    metadata:
      labels: { app: backend }
    spec:
      containers:
        - name: backend
          image: ghcr.io/OWNER/enterprise-ai-backend:v1.0.0
          ports: [{ containerPort: 8000 }]
          envFrom:
            - configMapRef: { name: enterprise-ai-config }
            - secretRef: { name: enterprise-ai-secrets }
          readinessProbe:
            httpGet: { path: /health, port: 8000 }
            initialDelaySeconds: 10
          livenessProbe:
            httpGet: { path: /health, port: 8000 }
            initialDelaySeconds: 30
          resources:
            requests: { cpu: "250m", memory: "256Mi" }
            limits: { cpu: "1", memory: "1Gi" }
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: enterprise-ai
spec:
  selector: { app: backend }
  ports:
    - port: 8000
      targetPort: 8000
