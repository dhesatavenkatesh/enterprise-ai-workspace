apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: enterprise-ai
spec:
  replicas: 2
  selector:
    matchLabels: { app: frontend }
  template:
    metadata:
      labels: { app: frontend }
    spec:
      containers:
        - name: frontend
          image: ghcr.io/OWNER/enterprise-ai-frontend:v1.0.0
          ports: [{ containerPort: 80 }]
          readinessProbe:
            httpGet: { path: /health, port: 80 }
          resources:
            requests: { cpu: "100m", memory: "128Mi" }
            limits: { cpu: "500m", memory: "512Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: enterprise-ai
spec:
  selector: { app: frontend }
  ports:
    - port: 80
      targetPort: 80
