apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: enterprise-ai-ingress
  namespace: enterprise-ai
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "25m"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts: [enterprise-ai.example.com]
      secretName: enterprise-ai-tls
  rules:
    - host: enterprise-ai.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port: { number: 8000 }
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port: { number: 80 }
