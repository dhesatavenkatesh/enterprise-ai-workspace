[tool.ruff]
target-version = "py312"
line-length = 100
exclude = [
    "venv",
    ".venv",
    "alembic/versions",
]

[tool.ruff.lint]
select = [
    "E",
    "F",
    "I",
    "B",
    "UP",
]
ignore = [
    "B008",
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.pytest.ini_options]
pythonpath = [
    ".",
]
testpaths = [
    "tests",
]
asyncio_mode = "auto"