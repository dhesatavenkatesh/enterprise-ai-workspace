name: enterprise-ai-workspace

services:
  postgres:
    image: postgres:16-alpine
    container_name: enterprise-ai-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

    networks:
      - enterprise_ai_network

  redis:
    image: redis:7-alpine
    container_name: enterprise-ai-redis
    restart: unless-stopped

    command:
      [
        "redis-server",
        "--appendonly",
        "yes",
      ]

    ports:
      - "6379:6379"

    volumes:
      - redis_data:/data

    healthcheck:
      test:
        [
          "CMD",
          "redis-cli",
          "ping",
        ]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

    networks:
      - enterprise_ai_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile

    container_name: enterprise-ai-backend
    restart: unless-stopped

    env_file:
      - .env.docker

    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_DB: ${REDIS_DB}

    ports:
      - "8000:8000"

    depends_on:
      postgres:
        condition: service_healthy

      redis:
        condition: service_healthy

    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

    networks:
      - enterprise_ai_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile

    container_name: enterprise-ai-frontend
    restart: unless-stopped

    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL}

    ports:
      - "5173:5173"

    depends_on:
      backend:
        condition: service_healthy

    networks:
      - enterprise_ai_network


volumes:
  postgres_data:
    name: enterprise_ai_postgres_data

  redis_data:
    name: enterprise_ai_redis_data


networks:
  enterprise_ai_network:
    name: enterprise_ai_network
    driver: bridge