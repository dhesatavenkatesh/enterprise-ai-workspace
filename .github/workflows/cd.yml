name: Enterprise AI CD

on:
  workflow_run:
    workflows:
      - Enterprise AI CI
    types:
      - completed
    branches:
      - develop
      - main

  push:
    tags:
      - "v*.*.*"

  workflow_dispatch:
    inputs:
      environment:
        description: Deployment environment
        required: true
        type: choice
        default: development
        options:
          - development
          - staging
          - production

      image_tag:
        description: Existing container image tag
        required: false
        type: string
        default: latest

permissions:
  contents: write
  packages: read
  deployments: write

concurrency:
  group: cd-${{ github.ref }}-${{ inputs.environment || 'automatic' }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ${{ github.repository_owner }}/enterprise-ai-backend
  FRONTEND_IMAGE: ${{ github.repository_owner }}/enterprise-ai-frontend

jobs:
  # ==========================================================
  # Validate triggering CI run
  # ==========================================================
  validate:
    name: Validate Deployment
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.values.outputs.image_tag }}
      deploy_development: ${{ steps.values.outputs.deploy_development }}
      deploy_staging: ${{ steps.values.outputs.deploy_staging }}
      deploy_production: ${{ steps.values.outputs.deploy_production }}

    steps:
      - name: Validate CI result
        if: github.event_name == 'workflow_run'
        shell: bash
        run: |
          if [[ "${{ github.event.workflow_run.conclusion }}" != "success" ]]; then
            echo "CI workflow did not complete successfully."
            exit 1
          fi

      - name: Calculate deployment values
        id: values
        shell: bash
        run: |
          IMAGE_TAG="${{ inputs.image_tag }}"

          if [[ -z "$IMAGE_TAG" ]]; then
            if [[ "${{ github.event_name }}" == "push" ]]; then
              IMAGE_TAG="${GITHUB_REF_NAME#v}"
            elif [[ "${{ github.event_name }}" == "workflow_run" ]]; then
              IMAGE_TAG="${{ github.event.workflow_run.head_sha }}"
              IMAGE_TAG="${IMAGE_TAG::7}"
            else
              IMAGE_TAG="latest"
            fi
          fi

          DEPLOY_DEVELOPMENT="false"
          DEPLOY_STAGING="false"
          DEPLOY_PRODUCTION="false"

          if [[ "${{ github.event_name }}" == "workflow_run" ]]; then
            if [[ "${{ github.event.workflow_run.head_branch }}" == "develop" ]]; then
              DEPLOY_DEVELOPMENT="true"
            fi

            if [[ "${{ github.event.workflow_run.head_branch }}" == "main" ]]; then
              DEPLOY_STAGING="true"
            fi
          fi

          if [[ "${{ github.event_name }}" == "push" && "${GITHUB_REF}" == refs/tags/v* ]]; then
            DEPLOY_STAGING="true"
            DEPLOY_PRODUCTION="true"
          fi

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            case "${{ inputs.environment }}" in
              development)
                DEPLOY_DEVELOPMENT="true"
                ;;
              staging)
                DEPLOY_STAGING="true"
                ;;
              production)
                DEPLOY_PRODUCTION="true"
                ;;
            esac
          fi

          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"
          echo "deploy_development=$DEPLOY_DEVELOPMENT" >> "$GITHUB_OUTPUT"
          echo "deploy_staging=$DEPLOY_STAGING" >> "$GITHUB_OUTPUT"
          echo "deploy_production=$DEPLOY_PRODUCTION" >> "$GITHUB_OUTPUT"

          echo "Image tag: $IMAGE_TAG"
          echo "Development: $DEPLOY_DEVELOPMENT"
          echo "Staging: $DEPLOY_STAGING"
          echo "Production: $DEPLOY_PRODUCTION"


  # ==========================================================
  # Deploy development
  # ==========================================================
  deploy-development:
    name: Deploy Development
    runs-on: ubuntu-latest

    needs:
      - validate

    if: needs.validate.outputs.deploy_development == 'true'

    environment:
      name: development
      url: ${{ vars.APPLICATION_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure Kubernetes access
        shell: bash
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBE_CONFIG }}" | base64 --decode > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Verify cluster connection
        run: kubectl cluster-info

      - name: Create namespace
        run: kubectl apply -f k8s/namespace.yaml

      - name: Apply shared configuration
        run: |
          kubectl apply -f k8s/configmap.yaml
          kubectl apply -f k8s/secret.yaml

      - name: Apply infrastructure
        run: |
          kubectl apply -f k8s/postgres.yaml
          kubectl apply -f k8s/redis.yaml
          kubectl apply -f k8s/chromadb.yaml

      - name: Apply application workloads
        run: |
          kubectl apply -f k8s/backend.yaml
          kubectl apply -f k8s/frontend.yaml
          kubectl apply -f k8s/hpa.yaml
          kubectl apply -f k8s/ingress.yaml

      - name: Set development image versions
        run: |
          kubectl -n enterprise-ai set image deployment/backend \
            backend=${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:${{ needs.validate.outputs.image_tag }}

          kubectl -n enterprise-ai set image deployment/frontend \
            frontend=${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:${{ needs.validate.outputs.image_tag }}

      - name: Wait for development deployment
        run: |
          kubectl -n enterprise-ai rollout status deployment/backend --timeout=300s
          kubectl -n enterprise-ai rollout status deployment/frontend --timeout=300s

      - name: Run development health checks
        shell: bash
        run: |
          kubectl -n enterprise-ai get pods
          kubectl -n enterprise-ai get services
          kubectl -n enterprise-ai get ingress


  # ==========================================================
  # Deploy staging
  # ==========================================================
  deploy-staging:
    name: Deploy Staging
    runs-on: ubuntu-latest

    needs:
      - validate

    if: needs.validate.outputs.deploy_staging == 'true'

    environment:
      name: staging
      url: ${{ vars.APPLICATION_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure Kubernetes access
        shell: bash
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBE_CONFIG }}" | base64 --decode > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Verify cluster connection
        run: kubectl cluster-info

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/configmap.yaml
          kubectl apply -f k8s/secret.yaml
          kubectl apply -f k8s/postgres.yaml
          kubectl apply -f k8s/redis.yaml
          kubectl apply -f k8s/chromadb.yaml
          kubectl apply -f k8s/backend.yaml
          kubectl apply -f k8s/frontend.yaml
          kubectl apply -f k8s/hpa.yaml
          kubectl apply -f k8s/ingress.yaml

      - name: Set staging image versions
        run: |
          kubectl -n enterprise-ai set image deployment/backend \
            backend=${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:${{ needs.validate.outputs.image_tag }}

          kubectl -n enterprise-ai set image deployment/frontend \
            frontend=${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:${{ needs.validate.outputs.image_tag }}

      - name: Wait for staging deployment
        run: |
          kubectl -n enterprise-ai rollout status deployment/backend --timeout=300s
          kubectl -n enterprise-ai rollout status deployment/frontend --timeout=300s

      - name: Run staging smoke test
        shell: bash
        run: |
          APPLICATION_URL="${{ vars.APPLICATION_URL }}"

          if [[ -n "$APPLICATION_URL" ]]; then
            curl \
              --fail \
              --retry 10 \
              --retry-delay 10 \
              --max-time 30 \
              "${APPLICATION_URL}/api/health"
          else
            echo "APPLICATION_URL is not configured."
            echo "Kubernetes rollout checks completed."
          fi


  # ==========================================================
  # Production approval and deployment
  # Configure required reviewers in the production environment
  # ==========================================================
  deploy-production:
    name: Approve and Deploy Production
    runs-on: ubuntu-latest

    needs:
      - validate
      - deploy-staging

    if: |
      always() &&
      needs.validate.outputs.deploy_production == 'true' &&
      (
        needs.deploy-staging.result == 'success' ||
        needs.deploy-staging.result == 'skipped'
      )

    environment:
      name: production
      url: ${{ vars.APPLICATION_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Kubernetes access
        shell: bash
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBE_CONFIG }}" | base64 --decode > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Verify cluster connection
        run: kubectl cluster-info

      - name: Record current production images
        id: previous
        shell: bash
        run: |
          PREVIOUS_BACKEND=$(kubectl -n enterprise-ai get deployment backend \
            -o jsonpath='{.spec.template.spec.containers[0].image}' 2>/dev/null || true)

          PREVIOUS_FRONTEND=$(kubectl -n enterprise-ai get deployment frontend \
            -o jsonpath='{.spec.template.spec.containers[0].image}' 2>/dev/null || true)

          echo "backend=$PREVIOUS_BACKEND" >> "$GITHUB_OUTPUT"
          echo "frontend=$PREVIOUS_FRONTEND" >> "$GITHUB_OUTPUT"

          echo "Previous backend: $PREVIOUS_BACKEND"
          echo "Previous frontend: $PREVIOUS_FRONTEND"

      - name: Apply production manifests
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/configmap.yaml
          kubectl apply -f k8s/secret.yaml
          kubectl apply -f k8s/postgres.yaml
          kubectl apply -f k8s/redis.yaml
          kubectl apply -f k8s/chromadb.yaml
          kubectl apply -f k8s/backend.yaml
          kubectl apply -f k8s/frontend.yaml
          kubectl apply -f k8s/hpa.yaml
          kubectl apply -f k8s/ingress.yaml

      - name: Deploy production images
        run: |
          kubectl -n enterprise-ai set image deployment/backend \
            backend=${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:${{ needs.validate.outputs.image_tag }}

          kubectl -n enterprise-ai set image deployment/frontend \
            frontend=${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:${{ needs.validate.outputs.image_tag }}

      - name: Wait for production rollout
        id: rollout
        continue-on-error: true
        shell: bash
        run: |
          kubectl -n enterprise-ai rollout status deployment/backend --timeout=300s
          kubectl -n enterprise-ai rollout status deployment/frontend --timeout=300s

      - name: Automatically roll back failed deployment
        if: steps.rollout.outcome == 'failure'
        shell: bash
        run: |
          echo "Production rollout failed. Starting rollback."

          kubectl -n enterprise-ai rollout undo deployment/backend
          kubectl -n enterprise-ai rollout undo deployment/frontend

          kubectl -n enterprise-ai rollout status deployment/backend --timeout=300s
          kubectl -n enterprise-ai rollout status deployment/frontend --timeout=300s

          echo "Rollback completed."
          exit 1

      - name: Run production health check
        shell: bash
        run: |
          APPLICATION_URL="${{ vars.APPLICATION_URL }}"

          if [[ -n "$APPLICATION_URL" ]]; then
            curl \
              --fail \
              --retry 12 \
              --retry-delay 10 \
              --max-time 30 \
              "${APPLICATION_URL}/api/health"
          else
            echo "APPLICATION_URL is not configured."
            kubectl -n enterprise-ai get pods
          fi

      - name: Show production status
        run: |
          kubectl -n enterprise-ai get deployments
          kubectl -n enterprise-ai get pods
          kubectl -n enterprise-ai get services
          kubectl -n enterprise-ai get ingress


  # ==========================================================
  # Generate release package
  # ==========================================================
  release-package:
    name: Generate Release Package
    runs-on: ubuntu-latest

    needs:
      - validate
      - deploy-production

    if: |
      always() &&
      github.event_name == 'push' &&
      startsWith(github.ref, 'refs/tags/v') &&
      needs.deploy-production.result == 'success'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate release information
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"

          mkdir -p release-package

          cp CHANGELOG.md release-package/ 2>/dev/null || true
          cp RELEASE_NOTES.md release-package/ 2>/dev/null || true
          cp -r k8s release-package/
          cp -r docker release-package/

          cat > release-package/build-manifest.txt <<EOF
          Enterprise AI Workspace
          Release: ${GITHUB_REF_NAME}
          Version: ${VERSION}
          Commit: ${GITHUB_SHA}
          Backend image: ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:${VERSION}
          Frontend image: ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:${VERSION}
          Created: $(date -u +"%Y-%m-%dT%H:%M:%SZ")
          EOF

          tar -czf "enterprise-ai-workspace-${VERSION}.tar.gz" release-package

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: enterprise-ai-workspace-${{ github.ref_name }}
          path: enterprise-ai-workspace-*.tar.gz
          retention-days: 90

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: Enterprise AI Workspace ${{ github.ref_name }}
          body_path: RELEASE_NOTES.md
          generate_release_notes: true
          files: enterprise-ai-workspace-*.tar.gz
          fail_on_unmatched_files: true


  # ==========================================================
  # Deployment summary
  # ==========================================================
  deployment-summary:
    name: Deployment Summary
    runs-on: ubuntu-latest

    if: always()

    needs:
      - validate
      - deploy-development
      - deploy-staging
      - deploy-production
      - release-package

    steps:
      - name: Add deployment summary
        run: |
          {
            echo "# Enterprise AI Workspace Deployment"
            echo ""
            echo "| Item | Value |"
            echo "|---|---|"
            echo "| Image tag | \`${{ needs.validate.outputs.image_tag }}\` |"
            echo "| Development | ${{ needs.deploy-development.result }} |"
            echo "| Staging | ${{ needs.deploy-staging.result }} |"
            echo "| Production | ${{ needs.deploy-production.result }} |"
            echo "| Release package | ${{ needs.release-package.result }} |"
            echo "| Commit | \`${{ github.sha }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"